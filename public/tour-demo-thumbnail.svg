<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="640" height="360" fill="url(#bg)"/>
  <rect width="640" height="360" fill="url(#accent)"/>

  <!-- Video grid: 2x2 participant tiles -->
  <!-- Top-left -->
  <rect x="20" y="20" width="292" height="152" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <circle cx="166" cy="80" r="28" fill="#334155"/>
  <text x="166" y="87" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="600" fill="#94a3b8">JT</text>
  <text x="166" y="152" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Jake Torres</text>

  <!-- Top-right -->
  <rect x="328" y="20" width="292" height="152" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <circle cx="474" cy="80" r="28" fill="#334155"/>
  <text x="474" y="87" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="600" fill="#94a3b8">LP</text>
  <text x="474" y="152" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Lisa Park</text>

  <!-- Bottom-left -->
  <rect x="20" y="188" width="292" height="152" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <circle cx="166" cy="248" r="28" fill="#334155"/>
  <text x="166" y="255" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="600" fill="#94a3b8">SW</text>
  <text x="166" y="320" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Sophie Wright</text>

  <!-- Bottom-right (you / rep) -->
  <rect x="328" y="188" width="292" height="152" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.4"/>
  <circle cx="474" cy="248" r="28" fill="#064e3b"/>
  <text x="474" y="255" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="600" fill="#34d399">SC</text>
  <text x="474" y="320" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#6ee7b7">Sarah Chen (You)</text>

  <!-- Recording indicator -->
  <circle cx="30" cy="350" r="4" fill="#ef4444">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="42" y="354" font-family="system-ui,sans-serif" font-size="10" fill="#f87171">REC</text>
</svg>
