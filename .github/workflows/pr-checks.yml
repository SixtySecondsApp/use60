name: PR Quality Checks

on:
  pull_request:
    branches: [main, staging]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-checks-${{ github.head_ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ============================================
  # Lint (REPORT ONLY — codebase has existing warnings, will block once cleaned)
  # ============================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint . --ext ts,tsx --report-unused-disable-directives

  # ============================================
  # Typecheck (BLOCKS MERGE)
  # ============================================
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npm run typecheck

  # ============================================
  # Build (BLOCKS MERGE)
  # ============================================
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      bundle_size: ${{ steps.size.outputs.bundle_size }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Measure bundle size
        id: size
        run: |
          BUNDLE_SIZE=$(du -sh dist/ 2>/dev/null | cut -f1 || echo "unknown")
          echo "bundle_size=$BUNDLE_SIZE" >> $GITHUB_OUTPUT
          echo "Bundle size: $BUNDLE_SIZE"

  # ============================================
  # Landing Page Build (BLOCKS MERGE when changed)
  # ============================================
  landing-page:
    name: Landing Page Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for landing page changes
        id: changes
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- packages/landing/ 2>/dev/null | head -1 || true)
          if [ -n "$CHANGED" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        run: npm ci

      - name: Build landing page
        if: steps.changes.outputs.changed == 'true'
        run: npm run build -w packages/landing

  # ============================================
  # Unit Tests (REPORT ONLY — does not block merge)
  # ============================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        id: tests
        run: |
          npm run test:run -- --reporter=default --reporter=junit --outputFile=test-results.xml 2>&1 | tee test-output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            test-results.xml
            test-output.txt
          retention-days: 7

  # ============================================
  # PR Status Dashboard (aggregates all results)
  # ============================================
  status-dashboard:
    name: PR Status Dashboard
    runs-on: ubuntu-latest
    needs: [lint, typecheck, build, unit-tests, landing-page]
    if: always()
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const lint = '${{ needs.lint.result }}';
            const typecheck = '${{ needs.typecheck.result }}';
            const build = '${{ needs.build.result }}';
            const tests = '${{ needs.unit-tests.result }}';
            const landing = '${{ needs.landing-page.result }}';
            const bundleSize = '${{ needs.build.outputs.bundle_size }}' || 'N/A';

            const icon = (status) => {
              if (status === 'success') return ':white_check_mark:';
              if (status === 'failure') return ':x:';
              if (status === 'skipped') return ':next_track_button:';
              return ':warning:';
            };

            const blocking = (status) => status === 'success' ? 'Pass' : '**BLOCKING**';
            const reportOnly = (status) => {
              if (status === 'success') return 'Pass';
              if (status === 'failure') return 'Failing (non-blocking)';
              return status;
            };

            let body = `## PR Quality Checks\n\n`;
            body += `| Check | Status | Blocks Merge? |\n`;
            body += `|-------|--------|---------------|\n`;
            body += `| ${icon(lint)} Lint | ${lint} | ${reportOnly(lint)} |\n`;
            body += `| ${icon(typecheck)} Typecheck | ${typecheck} | ${blocking(typecheck)} |\n`;
            body += `| ${icon(build)} Build | ${build} | ${blocking(build)} |\n`;
            body += `| ${icon(tests)} Unit Tests | ${tests} | ${reportOnly(tests)} |\n`;
            body += `| ${icon(landing)} Landing Page | ${landing} | ${landing === 'skipped' ? 'No changes' : blocking(landing)} |\n\n`;
            body += `**Bundle size:** ${bundleSize}\n\n`;
            body += `<!-- pr-checks-dashboard -->`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes('<!-- pr-checks-dashboard -->'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
