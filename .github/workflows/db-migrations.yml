name: Database Migrations

on:
  pull_request:
    branches: [staging, main]
    paths:
      - 'supabase/migrations/**'
  push:
    branches: [staging, main]
    # No paths filter on push — merge commits don't reliably detect
    # migration file changes. The apply jobs are idempotent (db push
    # exits cleanly when no pending migrations exist).

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: db-migrations-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate-migrations:
    name: Validate migrations (dry-run)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check for destructive operations
        id: destructive
        run: |
          # Find new/changed migration files in this PR
          CHANGED_MIGRATIONS=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- supabase/migrations/ 2>/dev/null || echo "")
          WARNINGS=""
          HAS_DESTRUCTIVE=false

          for file in $CHANGED_MIGRATIONS; do
            [ -f "$file" ] || continue
            FILENAME=$(basename "$file")

            # Check naming convention (YYYYMMDDHHMMSS_description.sql)
            if ! echo "$FILENAME" | grep -qE '^[0-9]{14}_.*\.sql$'; then
              WARNINGS="$WARNINGS\n- :warning: **$FILENAME** — non-standard naming (expected YYYYMMDDHHMMSS_description.sql)"
            fi

            # Check for destructive operations
            if grep -qiE '^\s*(DROP\s+TABLE|DROP\s+COLUMN|ALTER\s+.*\s+TYPE)' "$file" 2>/dev/null; then
              HAS_DESTRUCTIVE=true
              OPS=$(grep -iE '^\s*(DROP\s+TABLE|DROP\s+COLUMN|ALTER\s+.*\s+TYPE)' "$file" | head -5)
              WARNINGS="$WARNINGS\n- :rotating_light: **$FILENAME** contains destructive operations:\n\`\`\`sql\n$OPS\n\`\`\`"

              # Check for rollback comment in header
              if ! head -10 "$file" | grep -qi "rollback"; then
                WARNINGS="$WARNINGS\n  :warning: Missing rollback strategy in file header"
              fi
            fi

            # Check CREATE POLICY without DROP POLICY IF EXISTS
            if grep -q "CREATE POLICY" "$file" 2>/dev/null; then
              POLICY_COUNT=$(grep -c "CREATE POLICY" "$file")
              DROP_COUNT=$(grep -c "DROP POLICY IF EXISTS" "$file" 2>/dev/null || echo "0")
              if [ "$POLICY_COUNT" -gt "$DROP_COUNT" ]; then
                WARNINGS="$WARNINGS\n- :warning: **$FILENAME** — $POLICY_COUNT CREATE POLICY but only $DROP_COUNT DROP POLICY IF EXISTS (not idempotent)"
              fi
            fi
          done

          echo "has_destructive=$HAS_DESTRUCTIVE" >> $GITHUB_OUTPUT
          echo "warnings<<EOF" >> $GITHUB_OUTPUT
          echo -e "$WARNINGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Dry-run against staging
        id: dryrun-staging
        if: github.base_ref == 'staging'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.STAGING_DATABASE_PASSWORD }}
        run: |
          npx supabase link --project-ref caerqjzvuerejfrdtygb
          OUTPUT=$(npx supabase db push --linked --dry-run 2>&1) || true
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Dry-run against production
        id: dryrun-production
        if: github.base_ref == 'main'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DATABASE_PASSWORD }}
        run: |
          npx supabase link --project-ref ygdpgliavpxeugaajgrb
          OUTPUT=$(npx supabase db push --linked --dry-run 2>&1) || true
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post migration review comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const target = '${{ github.base_ref }}';
            const dryrun = target === 'staging'
              ? `${{ steps.dryrun-staging.outputs.output }}`
              : `${{ steps.dryrun-production.outputs.output }}`;
            const warnings = `${{ steps.destructive.outputs.warnings }}`;
            const hasDestructive = '${{ steps.destructive.outputs.has_destructive }}' === 'true';

            let body = `## Database Migration Review (${target})\n\n`;

            if (warnings && warnings.trim()) {
              body += `### Warnings\n${warnings}\n\n`;
            }

            if (hasDestructive) {
              body += `> :rotating_light: **This migration contains destructive operations.** Ensure rollback strategy is documented.\n\n`;
            }

            body += `### Dry-run Output\n`;
            body += `\`\`\`\n${dryrun || 'No output (no pending migrations)'}\n\`\`\`\n\n`;
            body += `<!-- db-migration-review -->`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes('<!-- db-migration-review -->'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  apply-staging:
    name: Apply migrations to staging
    if: github.event_name == 'push' && github.ref_name == 'staging'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Link and push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.STAGING_DATABASE_PASSWORD }}
        run: |
          npx supabase link --project-ref caerqjzvuerejfrdtygb
          npx supabase db push --linked

      - name: Notify Slack (success)
        if: success() && env.SLACK_BOT_TOKEN != ''
        continue-on-error: true
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_DEPLOY_CHANNEL_ID: ${{ secrets.SLACK_DEPLOY_CHANNEL_ID }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          curl -fsSL -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H 'Content-Type: application/json' \
            -d "{
              \"channel\": \"$SLACK_DEPLOY_CHANNEL_ID\",
              \"text\": \"Database migrations applied to staging\",
              \"blocks\": [
                { \"type\": \"header\", \"text\": { \"type\": \"plain_text\", \"text\": \"Migrations Applied\", \"emoji\": true } },
                { \"type\": \"section\", \"text\": { \"type\": \"mrkdwn\", \"text\": \":white_check_mark: *Database migrations applied to staging*\" } },
                { \"type\": \"section\", \"fields\": [
                  { \"type\": \"mrkdwn\", \"text\": \"*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|$SHORT_SHA>\" },
                  { \"type\": \"mrkdwn\", \"text\": \"*By:*\n${{ github.actor }}\" }
                ]},
                { \"type\": \"actions\", \"elements\": [{ \"type\": \"button\", \"text\": { \"type\": \"plain_text\", \"text\": \"View Workflow\" }, \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\" }] }
              ]
            }"

      - name: Notify Slack (failure)
        if: failure() && env.SLACK_BOT_TOKEN != ''
        continue-on-error: true
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_DEPLOY_CHANNEL_ID: ${{ secrets.SLACK_DEPLOY_CHANNEL_ID }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          curl -fsSL -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H 'Content-Type: application/json' \
            -d "{
              \"channel\": \"$SLACK_DEPLOY_CHANNEL_ID\",
              \"text\": \"Database migration FAILED on staging\",
              \"blocks\": [
                { \"type\": \"header\", \"text\": { \"type\": \"plain_text\", \"text\": \"Migration Failed\", \"emoji\": true } },
                { \"type\": \"section\", \"text\": { \"type\": \"mrkdwn\", \"text\": \":x: *Database migration FAILED on staging*\" } },
                { \"type\": \"section\", \"fields\": [
                  { \"type\": \"mrkdwn\", \"text\": \"*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|$SHORT_SHA>\" },
                  { \"type\": \"mrkdwn\", \"text\": \"*By:*\n${{ github.actor }}\" }
                ]},
                { \"type\": \"actions\", \"elements\": [{ \"type\": \"button\", \"text\": { \"type\": \"plain_text\", \"text\": \"View Workflow\" }, \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"style\": \"danger\" }] }
              ]
            }"

  apply-production:
    name: Apply migrations to production
    if: github.event_name == 'push' && github.ref_name == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Link and push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DATABASE_PASSWORD }}
        run: |
          npx supabase link --project-ref ygdpgliavpxeugaajgrb
          npx supabase db push --linked

      - name: Notify Slack (success)
        if: success() && env.SLACK_BOT_TOKEN != ''
        continue-on-error: true
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_DEPLOY_CHANNEL_ID: ${{ secrets.SLACK_DEPLOY_CHANNEL_ID }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          curl -fsSL -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H 'Content-Type: application/json' \
            -d "{
              \"channel\": \"$SLACK_DEPLOY_CHANNEL_ID\",
              \"text\": \"Database migrations applied to production\",
              \"blocks\": [
                { \"type\": \"header\", \"text\": { \"type\": \"plain_text\", \"text\": \"Migrations Applied\", \"emoji\": true } },
                { \"type\": \"section\", \"text\": { \"type\": \"mrkdwn\", \"text\": \":white_check_mark: *Database migrations applied to production*\" } },
                { \"type\": \"section\", \"fields\": [
                  { \"type\": \"mrkdwn\", \"text\": \"*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|$SHORT_SHA>\" },
                  { \"type\": \"mrkdwn\", \"text\": \"*By:*\n${{ github.actor }}\" }
                ]},
                { \"type\": \"actions\", \"elements\": [{ \"type\": \"button\", \"text\": { \"type\": \"plain_text\", \"text\": \"View Workflow\" }, \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\" }] }
              ]
            }"

      - name: Notify Slack (failure)
        if: failure() && env.SLACK_BOT_TOKEN != ''
        continue-on-error: true
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_DEPLOY_CHANNEL_ID: ${{ secrets.SLACK_DEPLOY_CHANNEL_ID }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          curl -fsSL -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H 'Content-Type: application/json' \
            -d "{
              \"channel\": \"$SLACK_DEPLOY_CHANNEL_ID\",
              \"text\": \"Database migration FAILED on production\",
              \"blocks\": [
                { \"type\": \"header\", \"text\": { \"type\": \"plain_text\", \"text\": \"Migration Failed\", \"emoji\": true } },
                { \"type\": \"section\", \"text\": { \"type\": \"mrkdwn\", \"text\": \":x: *Database migration FAILED on production*\" } },
                { \"type\": \"section\", \"fields\": [
                  { \"type\": \"mrkdwn\", \"text\": \"*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|$SHORT_SHA>\" },
                  { \"type\": \"mrkdwn\", \"text\": \"*By:*\n${{ github.actor }}\" }
                ]},
                { \"type\": \"actions\", \"elements\": [{ \"type\": \"button\", \"text\": { \"type\": \"plain_text\", \"text\": \"View Workflow\" }, \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"style\": \"danger\" }] }
              ]
            }"
