<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <title>Smart Envelope - AI Follow-up</title>
  <defs>
    <style>
      /* --- Envelope body --- */
      .ff-body {
        fill: none;
        stroke: #8129D7;
        stroke-width: 1.5;
        stroke-linejoin: round;
      }
      .ff-front-v {
        fill: none;
        stroke: rgba(168,85,247,0.3);
        stroke-width: 1;
      }

      /* --- Flap --- */
      .ff-flap {
        fill: none;
        stroke: #A855F7;
        stroke-width: 1.5;
        stroke-linejoin: round;
        transform-origin: 60px 50px;
        animation: ff-open 5s ease-in-out infinite;
      }

      /* --- Letter --- */
      .ff-letter {
        fill: rgba(255,255,255,0.92);
        stroke: rgba(255,255,255,0.2);
        stroke-width: 0.5;
        rx: 2; ry: 2;
        animation: ff-rise 5s ease-in-out infinite;
      }
      .ff-letter-line {
        fill: rgba(129,41,215,0.25);
        rx: 1; ry: 1;
        animation: ff-rise 5s ease-in-out infinite;
      }

      /* --- Sparkle --- */
      .ff-sparkle {
        fill: none;
        stroke: #A855F7;
        stroke-width: 1;
        stroke-linecap: round;
        opacity: 0;
        animation: ff-sparkle 5s ease-in-out infinite;
      }
      .ff-sparkle-dot {
        fill: #A855F7;
        opacity: 0;
        animation: ff-sparkle 5s ease-in-out infinite;
      }

      /* --- Glow --- */
      .ff-glow {
        opacity: 0;
        animation: ff-glow-pulse 5s ease-in-out infinite;
      }

      @keyframes ff-open {
        0%, 12% { transform: rotateX(0deg); }
        25%, 72% { transform: rotateX(165deg); }
        88%, 100% { transform: rotateX(0deg); }
      }
      @keyframes ff-rise {
        0%, 12% { transform: translateY(0); }
        25%, 72% { transform: translateY(-18px); }
        88%, 100% { transform: translateY(0); }
      }
      @keyframes ff-sparkle {
        0%, 28% { opacity: 0; }
        35%, 65% { opacity: 0.7; }
        72%, 100% { opacity: 0; }
      }
      @keyframes ff-glow-pulse {
        0%, 20% { opacity: 0; }
        30%, 65% { opacity: 0.4; }
        80%, 100% { opacity: 0; }
      }

      @media (prefers-reduced-motion: reduce) {
        .ff-flap, .ff-letter, .ff-letter-line,
        .ff-sparkle, .ff-sparkle-dot, .ff-glow {
          animation: none !important;
        }
      }
    </style>

    <linearGradient id="ff-env-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8129D7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6D28D9" stop-opacity="0.05"/>
    </linearGradient>

    <radialGradient id="ff-glow-g" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>

    <filter id="ff-blur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Glow behind envelope -->
  <rect class="ff-glow" x="18" y="30" width="84" height="60" rx="10" fill="url(#ff-glow-g)" filter="url(#ff-blur)"/>

  <!-- Letter rising from envelope -->
  <g>
    <rect class="ff-letter" x="38" y="46" width="44" height="34"/>
    <rect class="ff-letter-line" x="44" y="52" width="32" height="2.5"/>
    <rect class="ff-letter-line" x="44" y="58" width="26" height="2.5"/>
    <rect class="ff-letter-line" x="44" y="64" width="30" height="2.5"/>
    <rect class="ff-letter-line" x="44" y="70" width="20" height="2.5"/>
  </g>

  <!-- Envelope body (open bottom) -->
  <path class="ff-body" d="M24,50 L24,92 Q24,96 28,96 L92,96 Q96,96 96,92 L96,50 Z"/>
  <rect x="24" y="50" width="72" height="46" rx="3" fill="url(#ff-env-g)"/>

  <!-- Envelope front V -->
  <path class="ff-front-v" d="M24,50 L60,76 L96,50"/>

  <!-- Flap (opens upward) -->
  <path class="ff-flap" d="M24,50 L60,32 L96,50 Z"/>

  <!-- Sparkle at envelope tip -->
  <g>
    <circle class="ff-sparkle-dot" cx="60" cy="28" r="1.5"/>
    <line class="ff-sparkle" x1="60" y1="22" x2="60" y2="18"/>
    <line class="ff-sparkle" x1="60" y1="34" x2="60" y2="38"/>
    <line class="ff-sparkle" x1="54" y1="28" x2="50" y2="28"/>
    <line class="ff-sparkle" x1="66" y1="28" x2="70" y2="28"/>
    <line class="ff-sparkle" x1="55" y1="23" x2="52" y2="20"/>
    <line class="ff-sparkle" x1="65" y1="23" x2="68" y2="20"/>
    <line class="ff-sparkle" x1="55" y1="33" x2="52" y2="36"/>
    <line class="ff-sparkle" x1="65" y1="33" x2="68" y2="36"/>
  </g>
</svg>