<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <title>Entropy Field - Fragmented Sales Tools</title>
  <defs>
    <style>
      /* --- Icon drift --- */
      .ct-icon { fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
      .ct-g1 { animation: ct-drift1 9s ease-in-out infinite; }
      .ct-g2 { animation: ct-drift2 7.5s ease-in-out infinite; }
      .ct-g3 { animation: ct-drift3 10s ease-in-out infinite; }
      .ct-g4 { animation: ct-drift4 8s ease-in-out infinite; }
      .ct-g5 { animation: ct-drift5 11s ease-in-out infinite; }

      /* --- Broken connections --- */
      .ct-broken {
        fill: none;
        stroke: rgba(255,255,255,0.1);
        stroke-width: 0.8;
        stroke-dasharray: 5 6 2 8 3 12;
      }
      .ct-broken-flow1 { animation: ct-dash-flow 4s linear infinite; }
      .ct-broken-flow2 { animation: ct-dash-flow 5s linear infinite 0.6s; }
      .ct-broken-flow3 { animation: ct-dash-flow 4.5s linear infinite 1.2s; }
      .ct-broken-flow4 { animation: ct-dash-flow 5.5s linear infinite 1.8s; }

      /* --- Warning ring --- */
      .ct-warn-ring {
        fill: none;
        stroke: #F59E0B;
        stroke-width: 1.5;
        animation: ct-warn-expand 2.5s ease-out infinite;
      }
      .ct-warn-ring2 {
        animation-delay: 1.25s;
      }
      .ct-warn-dot {
        fill: #F59E0B;
        animation: ct-warn-blink 2.5s ease-in-out infinite;
      }

      /* --- Entropy particles --- */
      .ct-particle {
        fill: rgba(255,255,255,0.15);
        animation: ct-scatter 12s linear infinite;
      }
      .ct-p2 { animation-delay: 1.5s; }
      .ct-p3 { animation-delay: 3s; }
      .ct-p4 { animation-delay: 4.5s; }
      .ct-p5 { animation-delay: 6s; }
      .ct-p6 { animation-delay: 7.5s; }
      .ct-p7 { animation-delay: 9s; }
      .ct-p8 { animation-delay: 10.5s; }

      /* --- Glow halos --- */
      .ct-halo-blue { fill: url(#ct-halo-b); }
      .ct-halo-teal { fill: url(#ct-halo-t); }
      .ct-halo-violet { fill: url(#ct-halo-v); }
      .ct-halo-white { fill: url(#ct-halo-w); }

      /* --- Noise dots --- */
      .ct-noise {
        fill: rgba(255,255,255,0.04);
      }

      /* --- Keyframes --- */
      @keyframes ct-drift1 {
        0%, 100% { transform: translate(0,0); }
        25% { transform: translate(-6px,-10px); }
        50% { transform: translate(4px,-4px); }
        75% { transform: translate(-3px,7px); }
      }
      @keyframes ct-drift2 {
        0%, 100% { transform: translate(0,0); }
        30% { transform: translate(8px,6px); }
        60% { transform: translate(-5px,10px); }
      }
      @keyframes ct-drift3 {
        0%, 100% { transform: translate(0,0); }
        20% { transform: translate(-5px,8px); }
        50% { transform: translate(7px,-4px); }
        80% { transform: translate(2px,6px); }
      }
      @keyframes ct-drift4 {
        0%, 100% { transform: translate(0,0); }
        25% { transform: translate(6px,-8px); }
        50% { transform: translate(-4px,-3px); }
        75% { transform: translate(3px,7px); }
      }
      @keyframes ct-drift5 {
        0%, 100% { transform: translate(0,0); }
        20% { transform: translate(-7px,5px); }
        45% { transform: translate(3px,9px); }
        70% { transform: translate(6px,-5px); }
      }
      @keyframes ct-dash-flow {
        from { stroke-dashoffset: 0; }
        to { stroke-dashoffset: -36; }
      }
      @keyframes ct-warn-expand {
        0% { r: 14; opacity: 0.7; stroke-width: 1.5; }
        100% { r: 26; opacity: 0; stroke-width: 0.3; }
      }
      @keyframes ct-warn-blink {
        0%, 100% { opacity: 0.9; }
        50% { opacity: 0.35; }
      }
      @keyframes ct-scatter {
        0% { transform: translate(0,0); opacity: 0.2; }
        50% { opacity: 0.08; }
        100% { transform: translate(var(--dx,30px), var(--dy,30px)); opacity: 0; }
      }

      @media (prefers-reduced-motion: reduce) {
        .ct-g1, .ct-g2, .ct-g3, .ct-g4, .ct-g5,
        .ct-broken-flow1, .ct-broken-flow2, .ct-broken-flow3, .ct-broken-flow4,
        .ct-warn-ring, .ct-warn-ring2, .ct-warn-dot,
        .ct-particle, .ct-p2, .ct-p3, .ct-p4, .ct-p5, .ct-p6, .ct-p7, .ct-p8 {
          animation: none !important;
        }
      }
    </style>

    <!-- Halo gradients for icon glow -->
    <radialGradient id="ct-halo-b" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2A5EDB" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2A5EDB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ct-halo-t" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#03AD9C" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#03AD9C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ct-halo-v" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8129D7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8129D7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ct-halo-w" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>

    <filter id="ct-soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Noise texture dots -->
  <g>
    <circle class="ct-noise" cx="45" cy="67" r="1"/><circle class="ct-noise" cx="123" cy="345" r="0.8"/>
    <circle class="ct-noise" cx="210" cy="52" r="1.1"/><circle class="ct-noise" cx="340" cy="380" r="0.9"/>
    <circle class="ct-noise" cx="455" cy="45" r="1"/><circle class="ct-noise" cx="530" cy="310" r="0.8"/>
    <circle class="ct-noise" cx="78" cy="230" r="0.9"/><circle class="ct-noise" cx="560" cy="120" r="1.1"/>
    <circle class="ct-noise" cx="310" cy="30" r="0.8"/><circle class="ct-noise" cx="490" cy="375" r="1"/>
    <circle class="ct-noise" cx="175" cy="180" r="0.7"/><circle class="ct-noise" cx="420" cy="210" r="0.9"/>
    <circle class="ct-noise" cx="55" cy="370" r="1"/><circle class="ct-noise" cx="380" cy="55" r="0.8"/>
    <circle class="ct-noise" cx="270" cy="290" r="1.1"/><circle class="ct-noise" cx="540" cy="230" r="0.7"/>
  </g>

  <!-- Broken connection lines that fragment outward -->
  <path class="ct-broken ct-broken-flow1" d="M130,100 C200,140 250,160 300,200"/>
  <path class="ct-broken ct-broken-flow2" d="M300,200 C380,160 430,120 500,90"/>
  <path class="ct-broken ct-broken-flow3" d="M160,320 C220,280 260,240 300,210"/>
  <path class="ct-broken ct-broken-flow4" d="M500,90 C510,170 500,250 490,310"/>
  <path class="ct-broken ct-broken-flow1" d="M300,210 C360,260 410,290 470,310"/>
  <path class="ct-broken ct-broken-flow3" d="M130,100 C140,170 148,240 160,320"/>

  <!-- Entropy particles drifting outward -->
  <circle class="ct-particle" cx="290" cy="190" r="1.2" style="--dx:40px;--dy:-50px"/>
  <circle class="ct-particle ct-p2" cx="310" cy="210" r="1" style="--dx:-35px;--dy:45px"/>
  <circle class="ct-particle ct-p3" cx="280" cy="180" r="0.8" style="--dx:50px;--dy:30px"/>
  <circle class="ct-particle ct-p4" cx="320" cy="200" r="1.1" style="--dx:-45px;--dy:-35px"/>
  <circle class="ct-particle ct-p5" cx="300" cy="195" r="0.9" style="--dx:30px;--dy:50px"/>
  <circle class="ct-particle ct-p6" cx="275" cy="205" r="1" style="--dx:-55px;--dy:20px"/>
  <circle class="ct-particle ct-p7" cx="305" cy="185" r="0.7" style="--dx:45px;--dy:-40px"/>
  <circle class="ct-particle ct-p8" cx="295" cy="215" r="1.2" style="--dx:-25px;--dy:-55px"/>

  <!-- Icon 1: Email (concentric transmission arcs) — top left -->
  <g class="ct-g1" transform="translate(60,40) scale(2)">
    <circle class="ct-halo-blue" cx="18" cy="18" r="40"/>
    <path class="ct-icon" stroke="#2A5EDB" d="M4,8 L18,20 L32,8"/>
    <path class="ct-icon" stroke="#2A5EDB" opacity="0.7" d="M0,24 A22,22 0 0,1 4,8"/>
    <path class="ct-icon" stroke="#2A5EDB" opacity="0.7" d="M36,24 A22,22 0 0,0 32,8"/>
    <path class="ct-icon" stroke="#2A5EDB" opacity="0.4" d="M-4,30 A28,28 0 0,1 0,10"/>
    <path class="ct-icon" stroke="#2A5EDB" opacity="0.4" d="M40,30 A28,28 0 0,0 36,10"/>
  </g>

  <!-- Icon 2: Calendar (grid with missing cells) — center -->
  <g class="ct-g2" transform="translate(248,130) scale(2)">
    <circle class="ct-halo-teal" cx="18" cy="18" r="40"/>
    <rect class="ct-icon" stroke="#03AD9C" x="2" y="6" width="32" height="28" rx="3"/>
    <line class="ct-icon" stroke="#03AD9C" x1="2" y1="14" x2="34" y2="14"/>
    <line class="ct-icon" stroke="#03AD9C" x1="12" y1="14" x2="12" y2="34" opacity="0.3"/>
    <line class="ct-icon" stroke="#03AD9C" x1="24" y1="14" x2="24" y2="34" opacity="0.3"/>
    <line class="ct-icon" stroke="#03AD9C" x1="2" y1="24" x2="34" y2="24" opacity="0.3"/>
    <!-- Missing cells shown as gaps -->
    <rect x="14" y="16" width="8" height="6" rx="1" fill="rgba(3,173,156,0.12)"/>
    <rect x="26" y="26" width="6" height="6" rx="1" fill="rgba(3,173,156,0.12)"/>
  </g>

  <!-- Icon 3: Data (stacked lines with gaps) — top right -->
  <g class="ct-g3" transform="translate(440,30) scale(2)">
    <circle class="ct-halo-violet" cx="18" cy="18" r="40"/>
    <line class="ct-icon" stroke="#8129D7" x1="2" y1="6" x2="28" y2="6"/>
    <line class="ct-icon" stroke="#8129D7" x1="6" y1="14" x2="34" y2="14"/>
    <line class="ct-icon" stroke="#8129D7" x1="0" y1="22" x2="20" y2="22"/>
    <line class="ct-icon" stroke="#8129D7" x1="26" y1="22" x2="34" y2="22" opacity="0.4"/>
    <line class="ct-icon" stroke="#8129D7" x1="4" y1="30" x2="16" y2="30"/>
    <line class="ct-icon" stroke="#8129D7" x1="22" y1="30" x2="30" y2="30" opacity="0.4"/>
  </g>

  <!-- Icon 4: Tasks (broken checkboxes) — bottom left, with warning -->
  <g class="ct-g4" transform="translate(80,255) scale(2)">
    <circle class="ct-halo-white" cx="18" cy="18" r="40"/>
    <!-- Broken checkbox 1 -->
    <path class="ct-icon" stroke="rgba(255,255,255,0.6)" d="M4,4 L4,18 L18,18 L18,8" stroke-dasharray="3 2"/>
    <line class="ct-icon" stroke="rgba(255,255,255,0.35)" x1="24" y1="10" x2="38" y2="10"/>
    <!-- Broken checkbox 2 -->
    <path class="ct-icon" stroke="rgba(255,255,255,0.6)" d="M4,24 L18,24 L18,36 L8,36" stroke-dasharray="4 3"/>
    <line class="ct-icon" stroke="rgba(255,255,255,0.35)" x1="24" y1="30" x2="36" y2="30"/>
    <!-- Warning pulses -->
    <circle class="ct-warn-ring" cx="40" cy="4" r="14"/>
    <circle class="ct-warn-ring ct-warn-ring2" cx="40" cy="4" r="14"/>
    <circle class="ct-warn-dot" cx="40" cy="4" r="3"/>
  </g>

  <!-- Icon 5: Analytics (ascending bars with cracks) — bottom right -->
  <g class="ct-g5" transform="translate(430,250) scale(2)">
    <circle class="ct-halo-blue" cx="18" cy="18" r="40"/>
    <rect class="ct-icon" stroke="#2A5EDB" x="2" y="22" width="7" height="14" rx="1"/>
    <rect class="ct-icon" stroke="#2A5EDB" x="13" y="14" width="7" height="22" rx="1"/>
    <rect class="ct-icon" stroke="#2A5EDB" x="24" y="6" width="7" height="30" rx="1"/>
    <!-- Crack lines through bars -->
    <line stroke="rgba(255,255,255,0.15)" stroke-width="0.8" x1="2" y1="28" x2="9" y2="30"/>
    <line stroke="rgba(255,255,255,0.15)" stroke-width="0.8" x1="13" y1="22" x2="20" y2="20"/>
    <line stroke="rgba(255,255,255,0.15)" stroke-width="0.8" x1="24" y1="16" x2="31" y2="18"/>
    <!-- Broken baseline -->
    <line class="ct-icon" stroke="rgba(255,255,255,0.2)" x1="0" y1="36" x2="14" y2="36"/>
    <line class="ct-icon" stroke="rgba(255,255,255,0.2)" x1="20" y1="36" x2="34" y2="36"/>
  </g>
</svg>